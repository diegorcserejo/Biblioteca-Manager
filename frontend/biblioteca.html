<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Biblioteca Manager</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">📖</span>
                    <h1>Biblioteca Manager</h1>
                </div>
                <p class="subtitle">Sistema de Gerenciamento de Livros</p>
            </div>
        </header>

        <div id="message" class="message-container"></div>

        <div class="card form-card">
            <div class="card-header">
                <h2 id="formTitle"> Cadastrar Novo Livro</h2>
            </div>

            <form id="livroForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label> Autor *</label>
                        <input type="text" id="autor" required placeholder="Digite o nome do autor">
                    </div>

                    <div class="form-group">
                        <label> Título *</label>
                        <input type="text" id="titulo" required placeholder="Digite o título do livro">
                    </div>

                    <div class="form-group">
                        <label> Ano *</label>
                        <input type="number" id="ano" required placeholder="Ano de publicação">
                    </div>

                    <div class="form-group">
                        <label> Editora *</label>
                        <input type="text" id="editora" required placeholder="Nome da editora">
                    </div>

                    <div class="form-group">
                        <label> Localização *</label>
                        <input type="text" id="localizacao" required placeholder="Ex: A1-S2">
                    </div>

                    <div class="form-group">
                        <label> Edição *</label>
                        <input type="text" id="edicao" required placeholder="Ex: 1ª, 2ª ed.">
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">
                        <span class="btn-icon"></span> Salvar Livro
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                        <span class="btn-icon"></span> Limpar
                    </button>
                </div>
            </form>
        </div>

        <div class="card search-card">
            <div class="card-header">
                <h2> Buscar Livros</h2>
            </div>

            <div class="search-grid">
                <div class="search-group">
                    <input type="text" id="buscaAutor" class="search-input" placeholder="Buscar por autor...">
                    <button class="btn btn-primary" onclick="buscarPorAutor()">
                        <span class="btn-icon"></span> Buscar Autor
                    </button>
                </div>

                <div class="search-group">
                    <input type="text" id="buscaTitulo" class="search-input" placeholder="Buscar por título...">
                    <button class="btn btn-primary" onclick="buscarPorTitulo()">
                        <span class="btn-icon"></span> Buscar Título
                    </button>
                </div>

                <button class="btn btn-secondary btn-show-all" onclick="carregarLivros()">
                    <span class="btn-icon"></span> Mostrar Todos
                </button>
            </div>
        </div>

        <div class="card books-card">
            <div class="card-header">
                <h2> Lista de Livros</h2>
                <div class="stats" id="stats"></div>
            </div>

            <div class="table-wrapper">
                <table id="tabelaLivros">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Autor</th>
                            <th>Título</th>
                            <th>Ano</th>
                            <th>Editora</th>
                            <th>Localização</th>
                            <th>Edição</th>
                            <th>Data Cadastro</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaLivros">
                        <tr>
                            <td colspan="9" class="loading-cell">
                                <div class="spinner"></div>
                                <p>Carregando livros...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/frontend/script.js"></script>
</body>
</html>
